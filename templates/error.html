{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="container text-center py-5" style="min-height:70vh; display:flex; align-items:center; justify-content:center; flex-direction:column;">
  <div class="mb-4">
    <span style="font-size:6rem; font-weight:900; color:#0d6efd; font-family:'Rajdhani',sans-serif;">{{ code }}</span>
  </div>
  <h2 class="fw-bold mb-3">{{ msg }}</h2>
  <p class="text-muted mb-4">Please contact your administrator if you believe this is an error.</p>
  <div class="d-flex gap-3 justify-content-center">
    <a href="{{ url_for('home') }}" class="btn btn-primary"><i class="bi bi-house"></i> Home</a>
    <a href="javascript:history.back()" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Go Back</a>
  </div>
</div>
{% endblock %}
